{% extends 'base.html' %}

{% block title %}Login | Luxia Real Estate{% endblock %}

{% block content %}
<div class="container">
    <div class="form-container">
        <h2 style="text-align: center; color: var(--primary-color); margin-bottom: 2rem;">Welcome Back</h2>

        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field.errors }}
                {{ field }}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
            Don't have an account? <a href="{% url 'register' %}" style="font-weight: 500;">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
